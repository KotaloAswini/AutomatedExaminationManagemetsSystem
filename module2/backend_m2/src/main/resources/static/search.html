<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"> <!-- fixes © issue -->
    <title>Student Seating Search</title>

    <style>
        body {
            margin: 0;
            font-family: "Times New Roman", serif;
            text-align: center;
            background: #f5f5f5;
            min-height: 100vh;
        }

        /* TOP BLUE BAR */
        .top-bar {
            height: 10px;
            background: #2d7dd2;
        }

        /* BOTTOM BLUE BAR */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 10px;
            background: #2d7dd2;
        }

        .container {
            margin-top: 40px;
        }

        /* HEADER */
        .title {
            font-size: 26px;
            font-weight: bold;
        }

        .subtitle {
            font-size: 18px;
            margin-top: 5px;
        }

        /* NAV BUTTONS */
        .nav-buttons {
            margin-top: 25px;
        }

        .nav-buttons button {
            padding: 10px 22px;
            margin: 5px;
            border: 1px solid #ccc;
            background: #eee;
            cursor: pointer;
            font-size: 14px;
        }

        .nav-buttons .active {
            background: #2d7dd2;
            color: white;
            border: none;
        }

        /* SEARCH SECTION */
        .search-box {
            margin-top: 50px;
        }

        .input-group {
            margin-top: 20px;
        }

        .input-group input {
            width: 350px;
            padding: 10px;
            border: 1px solid #aaa;
            font-size: 14px;
        }

        .input-group button {
            padding: 10px 18px;
            border: 1px solid #aaa;
            background: #eee;
            cursor: pointer;
        }

        .result {
            margin-top: 25px;
            font-weight: bold;
            font-size: 16px;
        }

        /* FOOTER */
        .footer {
            position: fixed;
            bottom: 20px;
            width: 100%;
            font-size: 13px;
            color: #555;
        }

        /* WATERMARK */
        body::before {
            content: "";
            position: fixed;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-image: url("/images/nmit.logo.jpeg");
            background-repeat: no-repeat;
            background-size: 350px;
            width: 350px;
            height: 350px;
            opacity: 0.08;
            z-index: -1;
        }
    </style>
</head>

<body>

<div class="top-bar"></div>

<div class="container">

    <div class="title">
        NITTE MEENAKSHI INSTITUTE OF TECHNOLOGY
    </div>

    <div class="subtitle">
        EXAM SEATING SEARCH PORTAL
    </div>

    <div class="nav-buttons">
        <button class="active">Search</button>
        <button onclick="window.location.href='seating.html'">
            Seating Layout
        </button>
    </div>

    <div class="search-box">
        <h2>Student Seating Search Details</h2>

        <div style="margin-top:15px;">
    <select id="exam">
        <option value="MSE1">MSE1</option>
        <option value="OS">Operating Systems</option>
        <option value="DSA">Data Structures</option>
        <option value="CYBER">Cyber Security</option>
        <option value="OOP">OOP with Java</option>
    </select>
</div>



        <div class="input-group">
            <input type="text" id="usn" placeholder="Enter USN (e.g. 1NT22CS001)">
            <button onclick="findSeat()">Find Seat</button>
        </div>
    </div>

    <div class="result" id="result"></div>

</div>

<div class="footer">
    © 2025-2026 Nitte Meenakshi Institute of Technology (NITTE)<br>
    Department of Computer Science & Engineering
</div>

<div class="bottom-bar"></div>

<script>
function findSeat() {
    let usn = document.getElementById("usn").value.trim();

    if (usn === "") {
        document.getElementById("result").innerText = "Please enter  Valid USN";
        return;
    }

    fetch("/seats/find?usn=" + usn)
        .then(response => response.json())
        .then(data => {
            if (data.error) {
                document.getElementById("result").innerText = data.error;
            } else {

                localStorage.setItem("selectedUSN", usn);

                document.getElementById("result").innerHTML =
                    "USN: " + data.USN + "<br>" +
                    "Room: " + data.Room + "<br>" +
                    "Seat: " + data.Seat + "<br>" +
                    "Row: " + data.Row + "<br>" +
                    "Column: " + data.Column;

                setTimeout(() => {
                    window.location.href = "/seating.html";
                }, 4000);
            }
        })
        .catch(error => {
            document.getElementById("result").innerText = "Error fetching seat details";
        });
}
</script>

</body>
</html>
